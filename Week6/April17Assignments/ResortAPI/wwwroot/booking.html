<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Book Resort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <h3>Book Resort</h3>
        <form id="bookingForm">
            <input type="hidden" id="resortId" />
            <div class="mb-3">
                <label>No of persons</label>
                <input id="noOfPersons" type="number" class="form-control" required />
            </div>
            <div class="mb-3">
                <label>From</label>
                <input id="fromDate" type="date" class="form-control" required />
            </div>
            <div class="mb-3">
                <label>To</label>
                <input id="toDate" type="date" class="form-control" required />
            </div>
            <div class="mb-3">
                <label>Address</label>
                <input id="address" class="form-control" required />
            </div>
            <button class="btn btn-success">Book</button>
        </form>
    </div>

    <script>const params = new URLSearchParams(location.search);
    const resortId = params.get('resortId');
    document.getElementById('resortId').value = resortId;

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = localStorage.getItem('token');
      if (!token) { alert('Please login'); location.href = '/login.html'; return; }

      const payload = {
        noOfPersons: +document.getElementById('noOfPersons').value,
        fromDate: document.getElementById('fromDate').value,
        toDate: document.getElementById('toDate').value,
        totalPrice: 0,
        address: document.getElementById('address').value,
        resortId: +document.getElementById('resortId').value
      };

      const res = await fetch('/api/booking', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        alert('Booking created');
        window.location.href = '/customer-dashboard.html';
      } else {
        alert('Booking failed');
      }
    });</script>
</body>
</html>
